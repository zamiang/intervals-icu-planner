# Editable weekly plan for scripts/push-week.ts — use this when you want to
# hand-tune a week instead of running the generator (`npm run plan`).
#
# Each session has a `day` (Mon..Sun, or a 0-6 offset from the anchor Monday)
# and either:
#   - `workout: sweet_spot` / `workout: weight_training`
#       -> pulls name + description straight from config.yaml, or
#   - an explicit `name`, `type` (Ride | WeightTraining | ...), `description`.
#
# By default the week is anchored to the upcoming Monday. Override with
#   npm run push-week -- --start 2026-07-06
# Preview without writing to Intervals.icu with --dry-run. Days that already
# have a calendar event are skipped so re-running never duplicates.
#
# Watts/HR in descriptions render at push time from live Intervals.icu
# FTP/LTHR via the {ftp}/{lthr}/{w:NN}/{hr:NN} placeholders (see ftp_sync in
# config.yaml) — never hardcode watts here.

# Example week: one sweet-spot quality day, two strength sessions stacked onto
# ride days, a rest day, easy Zone 2 base everywhere else, and a long
# endurance ride to close the week. Edit to taste.

sessions:
  - day: Mon
    name: Easy Z2 Ride
    type: Ride
    load: 48
    minutes: 75
    intensity: 0.62
    description: >
      Easy Zone 2, ~75 min, conversational (~{w:62}W at {ftp}W FTP, HR under
      ~{hr:83} / 83% LTHR {lthr}). Pure aerobic base — no surges.

  - day: Mon
    workout: weight_training

  # Tue intentionally empty — rest day.

  - day: Wed
    workout: sweet_spot
    intensity: 0.88

  - day: Wed
    workout: weight_training

  - day: Thu
    name: Easy Z2 Ride
    type: Ride
    load: 48
    minutes: 75
    intensity: 0.62
    description: >
      Easy Zone 2, ~75 min, conversational (~{w:62}W at {ftp}W FTP, HR under
      ~{hr:83}). Pure aerobic base — keep it boring and steady.

  - day: Fri
    name: Easy Z2 Ride
    type: Ride
    load: 48
    minutes: 75
    intensity: 0.62
    description: >
      Easy Zone 2, ~75 min, conversational (~{w:62}W at {ftp}W FTP, HR under
      ~{hr:83}). Pure aerobic base — keep it boring and steady.

  - day: Sat
    name: Easy Z2 Ride
    type: Ride
    load: 48
    minutes: 75
    intensity: 0.62
    description: >
      Easy Zone 2, ~75 min, conversational (~{w:62}W at {ftp}W FTP, HR under
      ~{hr:83}). Pure aerobic base — keep it boring and steady.

  # Durability anchor — long aerobic ride to close the week.
  - day: Sun
    name: Long Endurance Ride
    type: Ride
    load: 115
    minutes: 180
    intensity: 0.62
    description: >
      Long Z2 endurance, ~3h. Strictly aerobic (~{w:62}W at {ftp}W FTP, HR
      under ~{hr:83}). Practice event fueling: 60-90 g carb/hr from the first
      30 min. Durability over intensity — keep it steady to the end.
